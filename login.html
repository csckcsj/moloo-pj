<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 - 즐겨찾기 사이트</title>
  <link rel="stylesheet" href="signup.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    .error-msg {
      color: red;
      font-size: 0.8rem;
      margin-top: 4px;
      display: block;
    }
    .input-group input.error-border {
      border-color: red;
    }
  </style>
</head>
<body>
  <div class="signup-container">
    <h1 onclick="window.location.href='index.html'">즐겨찾기 사이트</h1>
    <div class="signup-box">
      <h2>로그인</h2>

      <div class="input-group">
        <label>아이디</label>
        <input type="text" id="username" placeholder="아이디를 입력하세요">
      </div>

      <div class="input-group">
        <label>비밀번호</label>
        <input type="password" id="password" placeholder="비밀번호를 입력하세요">
      </div>

      <button class="signup-submit" id="loginBtn">로그인</button>
      <p class="login-link">계정이 없으신가요? <a href="signup.html">회원가입</a></p>
    </div>
  </div>

  <script>
    document.getElementById('loginBtn').addEventListener('click', () => {
      const usernameInput = document.getElementById('username');
      const passwordInput = document.getElementById('password');
      
      const username = usernameInput.value.trim();
      const password = passwordInput.value;

      document.getElementById('usernameError').textContent = '';
      document.getElementById('passwordError').textContent = '';
      usernameInput.classList.remove('error-border');
      passwordInput.classList.remove('error-border');

      let isValid = true;

      const usernameRegex = /^[a-zA-Z0-9]{4,12}$/;
      if (!username) {
        document.getElementById('usernameError').textContent = '아이디를 입력해주세요.';
        usernameInput.classList.add('error-border');
        isValid = false;
      } else if (!usernameRegex.test(username)) {
        document.getElementById('usernameError').textContent = '아이디는 4~12자의 영문 대소문자, 숫자만 가능합니다.';
        usernameInput.classList.add('error-border');
        isValid = false;
      }

      if (!password) {
        document.getElementById('passwordError').textContent = '비밀번호를 입력해주세요.';
        passwordInput.classList.add('error-border');
        isValid = false;
      }

      if (isValid) {
        alert('로그인 되었습니다!');
        window.location.href = 'index.html';
      }
    });
  </script>
</body>
</html>
