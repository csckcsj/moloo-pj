<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>즐겨찾기 사이트</title>
  <link rel="stylesheet" href="index.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

  <nav class="menu hidden">
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="index.html">즐겨찾기</a></li>
      <li><a href="about.html">소개</a></li>
      <li><a href="#">설정</a></li>
    </ul>
  </nav>

  <header>
    <div class="header-left">
      <div class="hamburger-menu">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
      </div>
      <h1 onclick="window.location.href='index.html'">즐겨찾기 사이트</h1>
    </div>

    <nav class="main-nav">
      <a href="index.html" class="nav-link active">홈</a>
      <a href="index.html" class="nav-link">즐겨찾기</a>
      <a href="about.html" class="nav-link">소개</a>
    </nav>

    <div class="header-right">
      <button class="login-btn" onclick="window.location.href='login.html'">로그인</button>
      <button class="signup-btn" onclick="window.location.href='signup.html'">회원가입</button>
    </div>
  </header>

  <hr>

  <!-- 메인 콘텐츠 -->
  <main>
    <div class="main-top">
      <h2 class="section-title">즐겨찾기</h2>
      <button class="add-category-btn" id="addCategoryBtn">+ 카테고리 추가</button>
    </div>

    <div id="categoryList"></div>
  </main>

  <div class="ad-sidebar">
    <p class="ad-label">AD</p>
    <img src="https://www.megabox.co.kr/event/detail?eventNo=19368" alt="광고">
  </div>

  <div class="overlay hidden" id="overlay"></div>
  <div class="add-bookmark-form hidden" id="addBookmarkForm">
    <h3>사이트 추가</h3>
    <input type="text" id="bookmarkName" placeholder="이름 (예: Google)">
    <input type="url" id="bookmarkUrl" placeholder="URL (예: https://google.com)">
    <div class="form-buttons">
      <button id="confirmBookmarkBtn">추가</button>
      <button id="cancelBookmarkBtn">취소</button>
    </div>
  </div>

  <script src="menu.js"></script>
  <script src="bookmark.js"></script>
</body>
</html>
